  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Righteous';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"19918207-da77-43c0-8554-fe43ba0773ea\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* ── DESIGN TOKENS ──────────────────────────────────────────── */\n:root {\n  /* Colors */\n  --safari-primary:   #1a7373;\n  --safari-secondary: #c45911;\n  --safari-nature:    #2d5016;\n  --safari-gold:      #b8860b;\n  --safari-rating:    #d97706;\n  --text-primary:     #1a1a1a;\n  --text-secondary:   #525252;\n  --text-muted:       #737373;\n  --dark-bg:          #111816;\n  --off-white:        #FDF8F0;\n  --white:            #ffffff;\n  --border:           #E5E7EB;\n\n  /* Hover states */\n  --primary-hover:    #156060;\n  --secondary-hover:  #a34b0e;\n\n  /* Light tints */\n  --primary-light:    #e6f4f4;\n  --nature-light:     #e8f3df;\n  --secondary-light:  #ffeee0;\n  --gold-light:       #fff9e6;\n\n  /* Typography */\n  --font-primary: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;\n  --font-logo:    'Righteous', cursive;\n\n  /* Sizing */\n  --max-width: 1200px;\n  --radius-sm: 6px;\n  --radius-md: 12px;\n  --radius-lg: 16px;\n  --radius-pill: 999px;\n}\n\n/* ── RESET & BASE ───────────────────────────────────────────── */\n*, *::before, *::after {\n  box-sizing: border-box;\n  margin: 0;\n  padding: 0;\n}\n\nhtml {\n  scroll-behavior: smooth;\n  font-size: 16px;\n}\n\nbody {\n  font-family: var(--font-primary);\n  color: var(--text-secondary);\n  background: var(--white);\n  line-height: 1.65;\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n  overflow-x: hidden;\n}\n\nimg {\n  max-width: 100%;\n  height: auto;\n  display: block;\n}\n\na {\n  color: inherit;\n  text-decoration: none;\n}\n\nbutton {\n  cursor: pointer;\n  font-family: var(--font-primary);\n  border: none;\n  background: none;\n}\n\nul, ol { list-style: none; }\n\n/* ── TYPOGRAPHY ─────────────────────────────────────────────── */\n.eyebrow {\n  font-size: 12px;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  text-transform: uppercase;\n  color: var(--safari-primary);\n  display: block;\n  margin-bottom: 16px;\n}\n\n.eyebrow--secondary { color: var(--safari-secondary); }\n\nh1, h2, h3, h4 {\n  color: var(--text-primary);\n  line-height: 1.15;\n  font-weight: 700;\n}\n\n/* V3: Hero headline with gradient */\n.hero-headline {\n  font-size: clamp(32px, 4.5vw, 54px);\n  font-weight: 800;\n  line-height: 1.1;\n  letter-spacing: -0.02em;\n  background: linear-gradient(100deg, #1a7373 0%, #b8860b 50%, #c45911 100%);\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  background-clip: text;\n  color: transparent;\n}\n\n.section-headline {\n  font-size: clamp(26px, 3.2vw, 38px);\n  font-weight: 700;\n  color: var(--text-primary);\n  margin-bottom: 20px;\n}\n\n.section-headline--center { text-align: center; }\n\nh2.sub-headline {\n  font-size: clamp(22px, 2.5vw, 32px);\n  font-weight: 700;\n  color: var(--text-primary);\n  margin-bottom: 16px;\n}\n\nh3.step-title {\n  font-size: 20px;\n  font-weight: 600;\n  color: var(--text-primary);\n  margin-bottom: 8px;\n}\n\n.body-text {\n  font-size: 16px;\n  line-height: 1.65;\n  color: var(--text-secondary);\n  max-width: 640px;\n}\n\n.body-text--center {\n  text-align: center;\n  margin-left: auto;\n  margin-right: auto;\n}\n\n.meta-text {\n  font-size: 13px;\n  color: var(--text-muted);\n}\n\n/* ── LAYOUT ─────────────────────────────────────────────────── */\n.container {\n  width: 100%;\n  max-width: var(--max-width);\n  margin: 0 auto;\n  padding: 0 24px;\n}\n\n@media (min-width: 1024px) {\n  .container { padding: 0 80px; }\n}\n\n.section {\n  padding: 64px 0;\n}\n\n@media (min-width: 1024px) {\n  .section { padding: 120px 0; }\n}\n\n.section--white    { background: var(--white); }\n.section--offwhite { background: var(--off-white); }\n.section--dark     { background: var(--dark-bg); }\n\n.two-col {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 48px;\n  align-items: center;\n}\n\n@media (min-width: 768px) {\n  .two-col { grid-template-columns: 1fr 1fr; gap: 64px; }\n  .two-col--60-40 { grid-template-columns: 60fr 40fr; }\n}\n\n/* ── BUTTONS ─────────────────────────────────────────────────── */\n.btn {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 14px 28px;\n  font-size: 15px;\n  font-weight: 600;\n  border-radius: var(--radius-sm);\n  transition: background 150ms ease, transform 150ms ease, box-shadow 150ms ease;\n  line-height: 1;\n  white-space: nowrap;\n}\n\n/* Smaller CTA in the nav bar */\n.nav__cta-btn {\n  padding: 13px 18px;\n  font-size: 16px;\n}\n\n/* Log In link in nav */\n.nav__login-link {\n  font-size: 16px;\n  font-weight: 500;\n  color: var(--text-secondary);\n  text-decoration: none;\n  padding: 10px 12px;\n  border-radius: var(--radius-sm);\n  transition: color 150ms ease;\n  white-space: nowrap;\n}\n.nav__login-link:hover {\n  color: var(--safari-primary);\n}\n\n.btn--primary {\n  background: var(--safari-primary);\n  color: var(--white);\n}\n\n.btn--primary:hover {\n  background: var(--primary-hover);\n  transform: scale(1.02);\n}\n\n.btn--ghost {\n  background: transparent;\n  color: var(--safari-primary);\n  border: 1.5px solid var(--safari-primary);\n}\n\n.btn--ghost:hover {\n  background: var(--primary-light);\n  transform: scale(1.02);\n}\n\n.btn--accent {\n  background: var(--safari-secondary);\n  color: var(--white);\n}\n\n.btn--accent:hover {\n  background: var(--secondary-hover);\n  transform: scale(1.02);\n}\n\n.btn--ghost-white {\n  background: transparent;\n  color: var(--white);\n  border: 1.5px solid var(--white);\n}\n\n.btn--ghost-white:hover {\n  background: rgba(255,255,255,0.08);\n  transform: scale(1.02);\n}\n\n.btn--sm {\n  padding: 8px 16px;\n  font-size: 13px;\n}\n\n.btn-group {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  flex-wrap: wrap;\n}\n\n/* ── NAVIGATION ──────────────────────────────────────────────── */\n.nav {\n  position: sticky;\n  top: 0;\n  z-index: 1000;\n  background: var(--white);\n  border-bottom: 1px solid var(--border);\n  transition: box-shadow 200ms ease;\n}\n\n.nav .container {\n  padding-left: 24px;\n  padding-right: 24px;\n}\n\n@media (min-width: 1024px) {\n  .nav .container {\n    padding-left: 16px;\n    padding-right: 16px;\n  }\n}\n\n.nav.scrolled {\n  box-shadow: 0 2px 16px rgba(0,0,0,0.08);\n}\n\n.nav__inner {\n  display: flex;\n  align-items: center;\n  height: 72px;\n  gap: 32px;\n}\n\n.nav__inner > nav {\n  flex: 1;\n}\n\n.nav__logo {\n  display: flex;\n  align-items: center;\n  text-decoration: none;\n  flex-shrink: 0;\n}\n\n/* V3: Larger logo */\n.nav__logo-img {\n  height: 80px;\n  width: auto;\n  object-fit: contain;\n  display: block;\n  filter: invert(1);\n}\n\n.nav__logo-text {\n  font-family: var(--font-logo);\n  font-size: 24px;\n  font-weight: 400;\n  color: var(--safari-primary);\n  letter-spacing: 0.02em;\n}\n\n.nav__links {\n  display: none;\n  align-items: center;\n  gap: 8px;\n  list-style: none;\n}\n\n@media (min-width: 768px) {\n  .nav__links { display: flex; }\n}\n\n.nav__link {\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--text-secondary);\n  padding: 8px 12px;\n  border-radius: 6px;\n  transition: color 150ms, background 150ms;\n  position: relative;\n  cursor: pointer;\n  background: none;\n  border: none;\n  font-family: var(--font-primary);\n  white-space: nowrap;\n}\n\n.nav__link:hover,\n.nav__link.active {\n  color: var(--safari-primary);\n  font-weight: 600;\n}\n\n.nav__link--platforms {\n  display: flex;\n  align-items: center;\n  gap: 4px;\n}\n\n.nav__link--platforms .chevron {\n  font-size: 10px;\n  transition: transform 200ms;\n}\n\n.nav__link--platforms.open .chevron {\n  transform: rotate(180deg);\n}\n\n/* Platforms Dropdown */\n.platforms-dropdown {\n  position: absolute;\n  top: calc(100% + 8px);\n  right: 0;\n  background: var(--white);\n  border: 1px solid var(--border);\n  border-radius: var(--radius-md);\n  box-shadow: 0 8px 32px rgba(0,0,0,0.12);\n  padding: 16px;\n  width: 320px;\n  display: none;\n  z-index: 100;\n}\n\n.platforms-dropdown.open {\n  display: block;\n}\n\n.platforms-dropdown__grid {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 8px;\n}\n\n.platform-chip-nav {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  padding: 8px 10px;\n  border: 1px solid var(--border);\n  border-radius: var(--radius-pill);\n  background: var(--white);\n  font-size: 12px;\n  font-weight: 500;\n  color: var(--text-secondary);\n  text-decoration: none;\n  transition: background 150ms, transform 150ms, box-shadow 150ms;\n  cursor: pointer;\n}\n\n.platform-chip-nav:hover {\n  background: var(--primary-light);\n  color: var(--safari-primary);\n  transform: translateY(-1px);\n  box-shadow: 0 2px 8px rgba(26,115,115,0.15);\n}\n\n.platform-chip-nav svg {\n  width: 14px;\n  height: 14px;\n  flex-shrink: 0;\n}\n\n/* Mobile nav */\n.nav__right {\n  display: flex;\n  align-items: center;\n  gap: 12px;\n  margin-left: auto;\n}\n\n.nav__hamburger {\n  display: flex;\n  flex-direction: column;\n  gap: 5px;\n  padding: 6px;\n  cursor: pointer;\n  background: none;\n  border: none;\n}\n\n@media (min-width: 768px) {\n  .nav__hamburger { display: none; }\n}\n\n.nav__hamburger span {\n  display: block;\n  width: 22px;\n  height: 2px;\n  background: var(--text-primary);\n  border-radius: 2px;\n  transition: transform 200ms, opacity 200ms;\n}\n\n.nav__hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }\n.nav__hamburger.open span:nth-child(2) { opacity: 0; }\n.nav__hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); -bottom: 36px;\n}\n\n.hero__cta-group {\n  display: flex;\n  align-items: center;\n  gap: 16px;\n  flex-wrap: wrap;\n}\n\n/* Hero mockup */\n.hero__mockup-wrapper {\n  position: relative;\n  margin-bottom: -80px;\n}\n\n@media (min-width: 768px) {\n  .hero__mockup-wrapper { margin-bottom: -120px; }\n}\n\n.hero__mockup {\n  background: var(--white);\n  border-radius: 16px;\n  box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 1px rgba(0,0,0,0.05);\n  overflow: hidden;\n  position: relative;\n  z-index: 2;\n}\n\n.mockup__topbar {\n  background: #1a1a1a;\n  padding: 12px 16px;\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n}\n\n.mockup__topbar-title {\n  font-size: 13px;\n  font-weight: 700;\n  color: var(--white);\n  letter-spacing: 0.05em;\n}\n\n.mockup__live {\n  display: flex;\n  align-items: center;\n  gap: 6px;\n  font-size: 11px;\n  font-weight: 600;\n  color: #6EE7B7;\n}\n\n.mockup__live-dot {\n  width: 7px;\n  height: 7px;\n  border-radius: 50%;\n  background: #6EE7B7;\n  animation: pulse-dot 2s ease infinite;\n}\n\n@keyframes pulse-dot {\n  0%, 100% { opacity: 1; transform: scale(1); }\n  50% { opacity: 0.5; transform: scale(0.8); }\n}\n\n.mockup__body {\n  padding: 12px;\n  background: #f8f9fa;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n\n.mockup-lead {\n  background: var(--white);\n  border: 1px solid var(--border);\n  border-radius: 10px;\n  padding: 12px;\n  display: flex;\n  gap: 10px;\n  align-items: flex-start;\n}\n\n.mockup-lead__icon {\n  width: 28px;\n  height: 28px;\n  border-radius: 50%;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n}\n\n.mockup-lead__content { flex: 1; min-width: 0; }\n\n.mockup-lead__source {\n  font-size: 10px;\n  font-weight: 600;\n  color: var(--text-muted);\n  text-transform: uppercase;\n  letter-spacing: 0.06em;\n  margin-bottom: 3px;\n}\n\n.mockup-lead__excerpt {\n  font-size: 11px;\n  color: var(--text-secondary);\n  line-height: 1.4  left: 5%;\n    animation: float-b 11s ease-in-out infinite;\n    animation-delay: 1s;\n  }\n  .float-card-5 {\n    bottom: 10%; right: 3%;\n    animation: float-a 13s ease-in-out infinite;\n    animation-delay: 3s;\n  }\n\n  @keyframes float-a {\n    0%, 100% { transform: translateY(0px); }\n    50%       { transform: translateY(-22px); }\n  }\n  @keyframes float-b {\n    0%, 100% { transform: translate(0, 0); }\n    50%       { transform: translate(-10px, -18px); }\n  }\n}\n\n@media (max-width: 767px) {\n  .float-card { opacity: 0.45; }\n  .float-card-2,\n  .float-card-4,\n  .float-card-5 { display: none; }\n  .float-card-1 { left: -10px; top: 5%; }\n  .float-card-3 { right: -10px; top: 30%; }\n}\n\n/* Hero scroll-in animations */\n@media (prefers-reduced-motion: no-preference) {\n  .hero__content > * {\n    opacity: 0;\n    transform: translateY(20px);\n    transition: opacity 0.5s ease, transform 0.5s ease;\n  }\n\n  body.hero-loaded .hero__content .hero__badge    { opacity: 1; transform: none; transition-delay: 0.1s; }\n  body.hero-loaded .hero__content .hero__headline { opacity: 1; transform: none; transition-delay: 0.25s; }\n  body.hero-loaded .hero__content .hero__subhead  { opacity: 1; transform: none; transition-delay: 0.4s; }\n  body.hero-loaded .hero__content .hero__cta-group{ opacity: 1; transform: none; transition-delay: 0.55s; }\n\n  .hero__mockup-wrapper {\n    opacity: 0;\n    transform: translateY(24px);\n    transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;\n  }\n  body.hero-loaded .hero__mockup-wrapper {\n    opacity: 1;\n    transform: translateY(0);\n  }\n}\n\n/* V3: Hero badge with logo font */\n.hero__badge {\n  display: inline-flex;\n  align-items: center;\n  gap: 8px;\n  padding: 6px 16px;\n  background: rgba(196,89,17,0.08);\n  border: 1px solid rgba(196,89,17,0.30);\n  border-radius: var(--radius-pill);\n  color: var(--safari-secondary);\n  font-family: var(--font-logo);\n  font-size: 13px;\n  font-weight: 400;\n  letter-spacing: 0.05em;\n  margin-bottom: 20px;\n  align-self: flex-start;\n}\n\n.hero__badge-dot {\n  width: 8px;\n  height: 8px;\n  border-radius: 50%;\n  background: var(--safari-secondary);\n  flex-shrink: 0;\n  animation: pulse-dot 2s ease infinite;\n}\n\n/* ── SECTION REVEAL ANIMATIONS ────────────────────────────────── */\n@media (prefers-reduced-motion: no-preference) {\n  .reveal {\n    opacity: 0;\n    transform: translateY(20px);\n    transition: opacity 0.4s ease, transform 0.4s ease;\n  }\n\n  .reveal.visible {\n    opacity: 1;\n    transform: none;\n  }\n\n  .reveal--delay-1 { transition-delay: 0.1s; }\n  .reveal--delay-2 { transition-delay: 0.2s; }\n  .reveal--delay-3 { transition-delay: 0.3s; }\n}\n\n/* ── PROBLEM CARDS (V3) ──────────────────────────────────────── */\n.problem-cards {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 16px;\n  margin-top: 48px;\n}\n\n@media (max-width: 767px) {\n  .problem-cards { grid-template-columns: 1fr; }\n}\n\n.problem-card {\n  border-radius: var(--radius-md);\n  padding: 28px;\n  transition: transform 220ms ease, box-shadow 220ms ease;\n  border: none;\n}\n\n.problem-card:hover {\n  transform: translateY(-4px);\n  box-shadow: 0 12px 32px rgba(0,0,0,0.1);\n}\n\n/* V3: Colored card backgrounds */\n.problem-card--teal    { background: var(--primary-light);    border-left: 4px solid var(--safari-primary); }\n.problem-card--orange  { background: var(--secondary-light);  border-left: 4px solid var(--safari-secondary); }\n.problem-card--green   { background: var(--nature-light);     border-left: 4px solid var(--safari-nature); }\n.problem-card--gold    { background: var(--gold-light);       border-left: 4px solid var(--safari-gold); }\n\n/* V3: Lordicon container */\n.problem-card__icon {\n  width: 72px;\n  height: 72px;\n  border-radius: var(--radius-md);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  margin-bottom: 20px;\n  flex-shrink: 0;\n}\n\n.problem-card--teal   .problem-card__icon { background: rgba(26,115,115,0.12); }\n.problem-card--orange .problem-card__icon { background: rgba(196,89,17,0.12); }\n.problem-card--green  .problem-card__icon { background: rgba(45,80,22,0.12); }\n.problem-card--gold   .problem-card__icon { background: rgba(184,134,11,0.12); }\n\n.problem-card__icon lord-icon { display: block; }\n\n.problem-icon {\n  display: block;\n  transition: transform 0.2s ease, opacity 0.2s ease;\n}\n.problem-card:hover .problem-icon {\n  transform: scale(1.12);\n  opacity: 0.85;\n}\n\n.problem-card__title {\n  font-size: 17px;\n  font-weight: 700;\n  color: var(--text-primary);\n  margin-bottom: 10px;\n  line-height: 1.35;\n}\n\n.problem-card__body {\n  font-size: 14px;\n  color: var(--text-secondary);\n  line-height: 1.6;\n}\n\n/* ── PLATFORM CHIPS (V3 — enhanced hover) ────────────────────── */\n.platform-chips {\n  display: grid;\n  grid-template-columns: repeat(3, 1fr);\n  gap: 10px;\n}\n\n@media (max-width: 767px) {\n  .platform-chips { grid-template-columns: repeat(2, 1fr); }\n}\n\n.platform-chip {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  height: 40px;\n  padding: 0 14px;\n  border: 1.5px solid var(--border);\n  border-radius: var(--radius-pill);\n  background: var(--white);\n  font-size: 13px;\n  font-weight: 500;\n  color: var(--text-secondary);\n  text-decoration: none;\n  transition: background 200ms, color 200ms, transform 200ms, box-shadow 200ms, border-color 200ms;\n  white-space: nowrap;\n}\n\n.platform-chip:hover {\n  background: var(--primary-light);\n  color: var(--safari-primary);\n  transform: translateY(-4px);\n  box-shadow: 0 8px 20px rgba(26,115,115,0.18);\n  border-color: var(--safari-primary);\n}\n\n.platform-chip:active {\n  transform: translateY(-1px) scale(0.98);\n}\n\n.platform-chip svg {\n  width: 16px;\n  height: 16px;\n  flex-shrink: 0;\n}\n\n.stat-callout {\n  margin-top: 32px;\n  padding-top: 32px;\n  border-top: 1px solid var(--border);\n}\n\n.stat-callout__number {\n  font-size: clamp(56px, 7vw, 80px);\n  font-weight: 800;\n  color: var(--safari-primary);\n  line-height: 1;\n  letter-spacing: -0.03em;\n}\n\n.stat-callout__label {\n  font-size: 16px;\n  color: var(--text-secondary);\n  margin-top: 4px;\n}\n\n/* ── LEAD CARD COMPONENT ─────────────────────────────────────── */\n.lead-card {\n  background: var(--white);\n  border: 1px solid var(--border);\n  border-radius: var(--radius-md);\n  box-shadow: 0 4px 24px rgba(0,0,0,0.08);\n  padding: 24px;\n  position: relative;\n  max-width: 420px;\n}\n\n.lead-card__header {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  margin-bottom: 16px;\n}\n\n.lead-card__source {\n  display: flex;\n  align-items: center;\n  gap: 8px;\n  font-size: 13px;\n  font-weight: 600;\n  color: var(--text-muted);\n}\n\n.lead-card__source svg { width: 18px; height: 18px; }\n\n.lead-card__score {\n  width: 48px;\n  height: 48px;\n  border-radius: 50%;\n  background: var(--safari-primary);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  font-size: 18px;\n  font-weight: 800;\n  color: var(--white);\n  flex-shrink: 0;\n}\n\n.lead-card__excerpt {\n  font-size: 15px;\n  font-style: italic;\n  color: var(--text-secondary);\n  line-height: 1.6;\n  margin-bottom: 16px;\n  padding: 12px 16px;\n  background: var(--off-white);\n  border-radius: 8px;\n  border-left: 3px solid var(--safari-primary);\n}\n\n.lead-card__badges {\n  display: flex;\n  gap: 8px;\n  flex-wrap: wrap;\n  margin-bottom: 16px;\n}\n\n.badge {\n  display: inline-flex;\n  align-items: center;\n  padding: 4px 10px;\n  background: var(--primary-light);\n  color: var(--safari-primary);\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.05em;\n  border-radius: var(--radius-pill);\n  text-transform: uppercase;\n}\n\n.badge--high   { background: #fef3c7; color: #92400e; }\n.badge--dates  { background: #d1fae5; color: #065f46; }\n.badge--budget { background: var(--primary-light); color: var(--safari-primary); }\n\n.lead-card__cta { margin-top: 4px; }\n\n.score-label {\n  font-size: 11px;\n  color: var(--text-muted);\n  text-align: right;\n  margin-top: 2px;\n}\n\n/* ── WHO IT'S FOR CARDS (V3 — bold split-color) ──────────────── */\n.icp-cards {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 24px;\n  margin-top: 32px;\n}\n\n@media (min-width: 768px) {\n  .icp-cards { grid-template-columns: 1fr 1fr; gap: 28px; }\n}\n\n.icp-card {\n  border-radius: var(--radius-lg);\n  padding: 40px 36px;\n  position: relative;\n  overflow: hidden;\n  transition: transform 220ms ease, box-shadow 220ms ease;\n}\n\n.icp-card:hover {\n  transform: translateY(-4px);\n  box-shadow: 0 16px 48px rgba(0,0,0,0.18);\n}\n\n/* V3: Teal card for Safari Operators */\n.icp-card--teal {\n  background: linear-gradient(135deg, #1a7373 0%, #145c5c 100%);\n  color: var(--white);\n}\n\n/* V3: Terracotta card for Window Is Hours */\n.icp-card--terracotta {\n  background: linear-gradient(135deg, #c45911 0%, #a34b0e 100%);\n  color: var(--white);\n}\n\n/* V3: Decorative corner blob */\n.icp-card::before {\n  content: '';\n  position: absolute;\n  top: -40px;\n  right: -40px;\n  width: 160px;\n  height: 160px;\n  border-radius: 50%;\n  background: rgba(255,255,255,0.06);\n  pointer-events: none;\n}\n\n.icp-card::after {\n  content: '';\n  position: absolute;\n  bottom: -60px;\n  left: -30px;\n  width: 200px;\n  height: 200px;\n  border-radius: 50%;\n  background: rgba(255,255,255,0.04);\n  pointer-events: none;\n}\n\n.icp-card__icon-wrap {\n  width: 80px;\n  height: 80px;\n  border-radius: var(--radius-md);\n  background: rgba(255,255,255,0.15);\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  margin-bottom: 24px;\n  position: relative;\n  z-index: 1;\n}\n\n.icp-card__icon-wrap lord-icon { display: block; }\n\n.icp-icon {\n  display: block;\n  transition: transform 0.25s ease, opacity 0.25s ease;\n}\n.icp-card:hover .icp-icon {\n  transform: scale(1.14);\n  opacity: 0.85;\n}\n\n.icp-card__title {\n  font-size: 22px;\n  font-weight: 700;\n  color: var(--white);\n  margin-bottom: 14px;\n  line-height: 1.25;\n  position: relative;\n  z-index: 1;\n}\n\n.icp-card__body {\n  font-size: 15px;\n  color: rgba(255,255,255,0.85);\n  line-height: 1.65;\n  margin-bottom: 24px;\n  position: relative;\n  z-index: 1;\n}\n\n/* V3: White checkmarks for dark bg cards */\n.icp-card .check-list li {\n  color: rgba(255,255,255,0.9);\n  font-size: 14px;\n  position: relative;\n  z-index: 1;\n}\n\n.icp-card .check-list {\n  display: flex;\n  flex-direction: column;\n  gap: 10px;\n}\n\n.icp-card .check-list li::before {\n  content: '';\n  width: 18px;\n  height: 18px;\n  min-width: 18px;\n  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 6L9 17l-5-5' stroke='%23ffffff' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\");\n  background-size: contain;\n  background-repeat: no-repeat;\n  flex-shrink: 0;\n  margin-top: 2px;\n}\n\n/* Standard check-list (for non-colored contexts) */\n.check-list {\n  list-style: none;\n  display: flex;\n  flex-direction: column;\n  gap: 8px;\n}\n\n.check-list li {\n  display: flex;\n  align-items: flex-start;\n  gap: 10px;\n  font-size: 14px;\n  color: var(--text-secondary);\n}\n\n.check-list li::before {\n  content: '';\n  width: 16px;\n  height: 16px;\n  min-width: 16px;\n  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 6L9 17l-5-5' stroke='%231a7373' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E\");\n  background-size: contain;\n  background-repeat: no-repeat;\n  flex-shrink: 0;\n  margin-top: 3px;\n}\n\n/* ── HOW IT WORKS STEPS ──────────────────────────────────────── */\n.steps {\n  position: relative;\n  display: flex;\n  flex-direction: column;\n  gap: 0;\n  max-width: 560px;\n}\n\n.step {\n  display: flex;\n  gap: 24px;\n  align-items: flex-start;\n  position: relative;\n}\n\n.step:not(:last-child)::after {\n  content: '';\n  position: absolute;\n  left: 23px;\n  top: 48px;\n  bottom: -32px;\n  width: 2px;\n  border-left: 2px dashed var(--border);\n}\n\n.step__number {\n  width: 48px;\n  height: 48px;\n  border-radius: 50%;\n  background: var(--safari-primary);\n  color: var(--white);\n  font-size: 18px;\n  font-weight: 700;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n  position: relative;\n  z-index: 1;\n  transition: box-shadow 200ms;\n}\n\n.step:hover .step__number {\n  box-shadow: 0 0 0 6px var(--primary-light);\n}\n\n.step__content { padding-bottom: 48px; padding-top: 6px; }\n.step:last-child .step__content { padding-bottom: 0; }\n\n/* ── CTA BANNER (V3) ─────────────────────────────────────────── */\n.cta-banner {\n  position: relative;\n  overflow: hidden;\n  text-align: center;\n  background:\n    radial-gradient(ellipse at 25% 60%, rgba(26,115,115,0.18) 0%, transparent 55%),\n    radial-gradient(ellipse at 75% 40%, rgba(45,80,22,0.15) 0%, transparent 55%),\n    #111816;\n}\n\n/* V3: Remove the SVG savanna silhouette — replaced by icon watermarks */\n.cta-banner__bg-svg { display: none; }\n\n/* V3: Scattered platform icon watermarks */\n.cta-watermark {\n  position: absolute;\n  pointer-events: none;\n  color: var(--safari-gold);\n  opacity: 0.08;\n  z-index: 0;\n}\n\n.cta-watermark svg { width: 100%; height: 100%; fill: currentColor; }\n\n.cta-watermark--1  { top: 6%;  left: 4%;   width: 80px;  height: 80px;  transform: rotate(-15deg); }\n.cta-watermark--2  { top: 12%; right: 8%;  width: 56px;  height: 56px;  transform: rotate(10deg); }\n.cta-watermark--3  { top: 40%; left: 2%;   width: 96px;  height: 96px;  transform: rotate(20deg); opacity: 0.06; }\n.cta-watermark--4  { top: 20%; right: 18%; width: 44px;  height: 44px;  transform: rotate(-8deg); }\n.cta-watermark--5  { bottom: 15%; left: 14%; width: 64px; height: 64px; transform: rotate(12deg); }\n.cta-watermark--6  { bottom: 8%;  right: 5%; width: 88px; height: 88px; transform: rotate(-20deg); opacity: 0.06; }\n.cta-watermark--7  { top: 55%;  right: 3%; width: 52px;  height: 52px;  transform: rotate(5deg); }\n.cta-watermark--8  { bottom: 30%; left: 45%; width: 40px; height: 40px; transform: rotate(-12deg); opacity: 0.05; }\n.cta-watermark--9  { top: 5%;  left: 40%;  width: 50px;  height: 50px;  transform: rotate(18deg); opacity: 0.06; }\n\n.cta-banner__inner {\n  position: relative;\n  z-index: 2;\n  padding: 80px 24px;\n}\n\n@media (min-width: 1024px) {\n  .cta-banner__inner { padding: 120px 80px; }\n}\n\n.cta-banner__headline {\n  font-size: clamp(26px, 3.5vw, 44px);\n  font-weight: 800;\n  color: var(--white);\n  line-height: 1.15;\n  margin-bottom: 16px;\n  max-width: 720px;\n  margin-left: auto;\n  margin-right: auto;\n}\n\n.cta-banner__subhead {\n  font-size: 17px;\n  color: #9CA3AF;\n  margin-bottom: 36px;\n  max-width: 480px;\n  margin-left: auto;\n  margin-right: auto;\n}\n\n.cta-banner__micro {\n  font-size: 13px;\n  color: #6B7280;\n  margin-top: 16px;\n}\n\n/* ── FAQ ACCORDION ───────────────────────────────────────────── */\n.faq { position: relative; }\n\n.faq__header {\n  display: flex;\n  align-items: flex-start;\n  justify-content: space-between;\n  margin-bottom: 40px;\n  gap: 16px;\n}\n\n.faq__contact {\n  font-size: 14px;\n  color: var(--safari-primary);\n  text-decoration: underline;\n  text-underline-offset: 3px;\n  white-space: nowrap;\n  margin-top: 4px;\n}\n\n.faq__grid {\n  display: grid;\n  grid-template-columns: 1fr;\n  gap: 0;\n}\n\n@media (min-width: 768px) {\n  .faq__grid { grid-template-columns: 1fr 1fr; column-gap: 48px; }\n}\n\n.faq__item { border-bottom: 1px solid var(--border); }\n\n.faq__question {\n  display: flex;\n  align-items: center;\n  justify-content: space-between;\n  padding: 20px 0;\n  cursor: pointer;\n  font-size: 16px;\n  font-weight: 600;\n  color: var(--text-primary);\n  gap: 16px;\n  background: none;\n  border: none;\n  width: 100%;\n  text-align: left;\n  font-family: var(--font-primary);\n  line-height: 1.4;\n}\n\n.faq__chevron {\n  font-size: 18px;\n  color: var(--text-muted);\n  transition: transform 200ms;\n  flex-shrink: 0;\n}\n\n.faq__item.open .faq__chevron { transform: rotate(180deg); }\n\n.faq__answer {\n  max-height: 0;\n  overflow: hidden;\n  transition: max-height 300ms ease, padding 300ms ease;\n}\n\n.faq__item.open .faq__answer { max-height: 300px; }\n\n.faq__answer-inner {\n  padding-bottom: 20px;\n  font-size: 15px;\n  color: var(--text-secondary);\n  line-height: 1.65;\n}\n\n/* ── FOOTER V3 — COMPLETE REDESIGN ──────────────────────────── */\n.footer {\n  background: var(--dark-bg);\n}\n\n/* Top row: Brand left + Newsletter right */\n.footer__top {\n  display: grid;\n  grid-template-columns: 1fr 1fr;\n  gap: 48px;\n  align-items: start;\n  padding: 64px 0 48px;\n}\n\n@media (max-width: 767px) {\n  .footer__top {\n    grid-template-columns: 1fr;\n    gap: 40px;\n    padding: 48px 0 36px;\n  }\n}\n\n/* Brand / Logo block */\n.footer__brand {}\n\n.footer__logo-img {\n  height: 80px;\n  width: auto;\n  object-fit: contain;\n  margin-bottom: 16px;\n  display: block;\n}\n\n.footer__brand-tagline {\n  font-size: 14px;\n  color: #6B7280;\n  line-height: 1.6;\n  max-width: 220px;\n}\n\n/* Stay Updated block */\n.footer__newsletter {}\n\n.footer__newsletter-heading {\n  font-size: 22px;\n  font-weight: 700;\n  color: var(--white);\n  margin-bottom: 8px;\n  letter-spacing: -0.01em;\n}\n\n.footer__newsletter-sub {\n  font-size: 14px;\n  color: #9CA3AF;\n  margin-bottom: 20px;\n  line-height: 1.55;\n  max-width: 280px;\n}\n\n/* Pill input with arrow button */\n.footer__input-pill {\n  display: flex;\n  border-radius: var(--radius-pill);\n  overflow: hidden;\n  background: rgba(255,255,255,0.06);\n  border: 1px solid rgba(255,255,255,0.12);\n  max-width: 340px;\n}\n\n.footer__email-input {\n  flex: 1;\n  background: transparent;\n  border: none;\n  padding: 14px 20px;\n  font-size: 14px;\n  color: var(--white);\n  font-family: var(--font-primary);\n  outline: none;\n  min-width: 0;\n}\n\n.footer__email-input::placeholder { color: rgba(255,255,255,0.38); }\n\n.footer__submit-arrow {\n  background: var(--safari-secondary);\n  color: var(--white);\n  border: none;\n  width: 46px;\n  min-width: 46px;\n  height: 46px;\n  border-radius: 50%;\n  font-size: 18px;\n  cursor: pointer;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  flex-shrink: 0;\n  margin: 3px;\n  transition: background 150ms, transform 150ms;\n  font-family: var(--font-primary);\n}\n\n.footer__submit-arrow:hover {\n  background: var(--secondary-hover);\n  transform: scale(1.05);\n}\n\n/* Divider */\n.footer__divider {\n  height: 1px;\n  background: rgba(255,255,255,0.08);\n}\n\n/* 3 columns */\n.footer__columns {\n  display: grid;\n  grid-template-columns: 1fr 1fr 1fr;\n  gap: 48px;\n  padding: 48px 0 40px;\n  align-items: start;\n}\n\n@media (max-width: 767px) {\n  .footer__columns {\n    grid-template-columns: 1fr;\n    gap: 36px;\n    padding: 36px 0 28px;\n  }\n}\n\n.footer__col-heading {\n  font-size: 11px;\n  font-weight: 700;\n  letter-spacing: 0.12em;\n  color: var(--safari-secondary);\n  text-transform: uppercase;\n  margin-bottom: 16px;\n  display: block;\n}\n\n.footer__col-links { list-style: none; }\n\n.footer__col-link {\n  color: #9CA3AF;\n  font-size: 14px;\n  line-height: 2.4;\n  display: block;\n  text-decoration: none;\n  transition: color 150ms;\n}\n\n.footer__col-link:hover { color: var(--white); }\n\n/* Connect With Us social icons */\n.footer__socials {\n  display: flex;\n  gap: 12px;\n  align-items: center;\n  flex-wrap: wrap;\n  margin-top: 4px;\n}\n\n.footer__social-link {\n  color: #9CA3AF;\n  transition: color 150ms, transform 150ms;\n  display: flex;\n  align-items: center;\n}\n\n.footer__social-link:hover {\n  color: var(--white);\n  transform: translateY(-2px);\n}\n\n.footer__social-link svg { width: 22px; height: 22px; }\n\n/* Legal bar */\n.footer__legal-bar {\n  border-top: 1px solid rgba(255,255,255,0.08);\n  padding: 20px 0;\n  display: flex;\n  flex-direction: column;\n  gap: 12px;\n  align-items: center;\n  text-align: center;\n}\n\n@media (min-width: 768px) {\n  .footer__legal-bar {\n    flex-direction: row;\n    justify-content: space-between;\n    text-align: left;\n  }\n}\n\n.footer__legal-copy { font-size: 12px; color: #6B7280; }\n\n.footer__legal-links {\n  display: flex;\n  gap: 20px;\n  flex-wrap: wrap;\n  justify-content: center;\n}\n\n.footer__legal-link {\n  font-size: 12px;\n  color: #6B7280;\n  text-decoration: none;\n  transition: color 150ms;\n}\n\n.footer__legal-link:hover { color: #9CA3AF; }\n\n/* ── PLATFORM PAGE — HERO ────────────────────────────────────── */\n.platform-hero {\n  background: var(--white);\n  padding: 80px 0 64px;\n  text-align: center;\n}\n\n.platform-hero__chip {\n  display: inline-flex;\n  align-items: center;\n  gap: 10px;\n  height: 48px;\n  padding: 0 20px;\n  border: 1.5px solid var(--border);\n  border-radius: var(--radius-pill);\n  background: var(--white);\n  font-size: 15px;\n  font-weight: 600;\n  color: var(--text-primary);\n  margin-bottom: 32px;\n  box-shadow: 0 2px 8px rgba(0,0,0,0.06);\n}\n\n.platform-hero__chip svg { width: 24px; height: 24px; }\n\n.platform-hero__headline {\n  font-size: clamp(28px, 4vw, 48px);\n  font-weight: 800;\n  color: var(--text-primary);\n  line-height: 1.15;\n  letter-spacing: -0.02em;\n  max-width: 720px;\n  margin: 0 auto 24px;\n}\n\n.platform-hero__body {\n  font-size: 16px;\n  line-height: 1.7;\n  color: var(--text-secondary);\n  max-width: 640px;\n  margin: 0 auto 36px;\n  text-align: center;\n}\n\n.platform-hero__micro {\n  font-size: 13px;\n  color: var(--text-muted);\n  margin-top: 12px;\n}\n\n/* ── STAT BAR ────────────────────────────────────────────────── */\n.stat-bar {\n  background: var(--dark-bg);\n  padding: 48px 0;\n}\n\n.stat-bar__grid {\n  display: grid;\n  grid-template-columns: repeat(2, 1fr);\n  gap: 32px;\n}\n\n@media (min-width: 768px) {\n  .stat-bar__grid { grid-template-columns: repeat(4, 1fr); }\n}\n\n.stat-bar__item { text-align: center; }\n\n.stat-bar__number {\n  font-size: clamp(28px, 4vw, 40px);\n  font-weight: 800;\n  color: var(--white);\n  line-height: 1;\n  margin-bottom: 8px;\n  letter-spacing: -0.02em;\n}\n\n.stat-bar__label {\n  font-size: 13px;\n  color: #9CA3AF;\n  line-height: 1.4;\n}\n\n/* ── UTILITIES ───────────────────────────────────────────────── */\n.text-center { text-align: center; }\n.mb-8  { margin-bottom: 8px; }\n.mb-12 { margin-bottom: 12px; }\n.mb-16 { margin-bottom: 16px; }\n.mb-20 { margin-bottom: 20px; }\n.mb-24 { margin-bottom: 24px; }\n.mb-32 { margin-bottom: 32px; }\n.mb-40 { margin-bottom: 40px; }\n.mb-48 { margin-bottom: 48px; }\n.mt-8  { margin-top: 8px; }\n.mt-12 { margin-top: 12px; }\n.mt-16 { margin-top: 16px; }\n.mt-32 { margin-top: 32px; }\n.sr-only {\n  position: absolute; width: 1px; height: 1px;\n  padding: 0; margin: -1px; overflow: hidden;\n  clip: rect(0,0,0,0); white-space: nowrap; border-width: 0;\n}\n<\u002Fstyle>\n<style>\n  body {\n    background: var(--off-white);\n    color: var(--text-secondary);\n  }\n\n  /* ── SECTION SHELL ──────────────────────────────────── */\n  .whofor {\n    padding: 72px 0 96px;\n  }\n  @media (min-width: 1024px) {\n    .whofor { padding: 112px 0 128px; }\n  }\n  .whofor__container {\n    width: 100%;\n    max-width: 1200px;\n    margin: 0 auto;\n    padding: 0 24px;\n  }\n  @media (min-width: 1024px) {\n    .whofor__container { padding: 0 80px; }\n  }\n\n  /* ── HEADER ─────────────────────────────────────────── */\n  .whofor__eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 10px;\n    font-size: 12px;\n    font-weight: 700;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: var(--safari-primary);\n    margin-bottom: 22px;\n  }\n  .whofor__eyebrow::before {\n    content: \"\";\n    width: 28px;\n    height: 2px;\n    background: var(--safari-primary);\n    display: inline-block;\n  }\n  .whofor__headline {\n    font-size: clamp(30px, 4vw, 48px);\n    font-weight: 800;\n    line-height: 1.08;\n    letter-spacing: -0.025em;\n    color: var(--text-primary);\n    max-width: 17ch;\n    text-wrap: balance;\n  }\n  .whofor__headline em {\n    font-style: normal;\n    color: var(--safari-secondary);\n  }\n  .whofor__intro {\n    margin-top: 22px;\n    font-size: 17px;\n    line-height: 1.6;\n    color: var(--text-secondary);\n    max-width: 52ch;\n  }\n\n  /* ── GRID ───────────────────────────────────────────── */\n  .whofor__grid {\n    margin-top: 56px;\n    display: grid;\n    grid-template-columns: 1fr;\n    gap: 22px;\n  }\n  @media (min-width: 760px) {\n    .whofor__grid { grid-template-columns: 1fr 1fr; gap: 24px; }\n  }\n\n  /* ── CARD ───────────────────────────────────────────── */\n  .pain {\n    --accent: var(--safari-primary);\n    --accent-tint: var(--primary-light);\n    position: relative;\n    display: flex;\n    flex-direction: column;\n    background: var(--white);\n    border: 1px solid var(--border);\n    border-radius: var(--radius-lg);\n    padding: 34px 34px 32px;\n    overflow: hidden;\n    transition: transform .28s cubic-bezier(.2,.7,.2,1), box-shadow .28s ease, border-color .28s ease;\n  }\n  .pain::before {\n    content: \"\";\n    position: absolute;\n    top: 0; left: 0; right: 0;\n    height: 3px;\n    background: var(--accent);\n    transform: scaleX(0);\n    transform-origin: left;\n    transition: transform .4s cubic-bezier(.2,.7,.2,1);\n  }\n  .pain:hover {\n    transform: translateY(-5px);\n    box-shadow: 0 22px 50px -22px rgba(26,40,38,0.28);\n    border-color: transparent;\n  }\n  .pain:hover::before { transform: scaleX(1); }\n\n  .pain__top {\n    display: flex;\n    align-items: center;\n    margin-bottom: 22px;\n  }\n  .pain__icon {\n    width: 56px;\n    height: 56px;\n    border-radius: 14px;\n    background: var(--accent-tint);\n    color: var(--accent);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    flex-shrink: 0;\n  }\n  .pain__icon svg { display: block; }\n\n  .pain__title {\n    font-size: 21px;\n    font-weight: 700;\n    line-height: 1.24;\n    color: var(--text-primary);\n    margin-bottom: 12px;\n    letter-spacing: -0.01em;\n  }\n  .pain__problem {\n    font-size: 15px;\n    line-height: 1.62;\n    color: var(--text-secondary);\n    margin-bottom: 22px;\n  }\n\n  .pain__fix {\n    display: flex;\n    gap: 12px;\n    align-items: flex-start;\n    margin-top: auto;\n    padding-top: 20px;\n    border-top: 1px solid var(--border);\n  }\n  .pain__arrow {\n    flex-shrink: 0;\n    width: 26px;\n    height: 26px;\n    border-radius: 50%;\n    background: var(--accent);\n    color: var(--white);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    margin-top: 1px;\n  }\n  .pain__arrow svg { display: block; }\n  .pain__fix p {\n    font-size: 14.5px;\n    line-height: 1.55;\n    color: var(--text-primary);\n    font-weight: 500;\n  }\n  .pain__fix b {\n    color: var(--accent);\n    font-weight: 700;\n  }\n\n  /* ── ACCENT VARIANTS ────────────────────────────────── */\n  .pain--teal       { --accent: #1a7373; --accent-tint: #e6f4f4; }\n  .pain--terracotta { --accent: #c45911; --accent-tint: #ffeee0; }\n  .pain--gold       { --accent: #a9760a; --accent-tint: #fff4d6; }\n  .pain--nature     { --accent: #3a6418; --accent-tint: #e8f3df; }\n\n  /* ENTRANCE: JS-gated so resting state is always visible */\n  .wf-reveal { opacity: 1; transform: none; }\n  @media (prefers-reduced-motion: no-preference) {\n    .wf-anim .wf-reveal { opacity: 0; transform: translateY(18px); }\n    .wf-anim .wf-reveal.go { opacity: 1; transform: none; transition: opacity .6s ease, transform .65s cubic-bezier(.2,.7,.2,1); }\n    .wf-reveal.d1 { transition-delay: .06s; }\n    .wf-reveal.d2 { transition-delay: .12s; }\n    .wf-reveal.d3 { transition-delay: .18s; }\n    .wf-reveal.d4 { transition-delay: .24s; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<section class=\"whofor\" aria-label=\"Who it's for\">\n  <div class=\"whofor__container\">\n\n    <header>\n      <span class=\"whofor__eyebrow wf-reveal\">Who It's For<\u002Fspan>\n      <h2 class=\"whofor__headline wf-reveal d1\">Safari operators tired of <em>expensive acquisition<\u002Fem> and weak leads<\u002Fh2>\n    <\u002Fheader>\n\n    <div class=\"whofor__grid\">\n\n      <!-- 1 · Ads -->\n      <article class=\"pain pain--teal wf-reveal d1\">\n        <div class=\"pain__top\">\n          <div class=\"pain__icon\" aria-hidden=\"true\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M3 11v3a1 1 0 0 0 1 1h1.5l1 5h2.2l-1-5L19 19V5L7.7 11H4a1 1 0 0 0-1 0z\"><\u002Fpath>\n              <path d=\"M19 8.5a3.5 3.5 0 0 1 0 7\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h3 class=\"pain__title\">Spending too much on ads<\u002Fh3>\n        <p class=\"pain__problem\">You pay for clicks, traffic, and visibility, but the right traveler still doesn't reach your inbox.<\u002Fp>\n        <div class=\"pain__fix\">\n          <span class=\"pain__arrow\" aria-hidden=\"true\">\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <p><b>Wandar<\u002Fb> finds safari intent where the planning actually starts.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- 2 · Pay-per-quote -->\n      <article class=\"pain pain--terracotta wf-reveal d2\">\n        <div class=\"pain__top\">\n          <div class=\"pain__icon\" aria-hidden=\"true\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0l-7.2-7.2A2 2 0 0 1 2.8 12V4.8A2 2 0 0 1 4.8 2.8H12a2 2 0 0 1 1.4.6l7.2 7.2a2 2 0 0 1 0 2.8z\"><\u002Fpath>\n              <path d=\"M9.5 8.2c0-.8.7-1.3 1.6-1.3.9 0 1.6.6 1.6 1.3 0 1.6-2.7 1.1-2.7 2.6 0 .7.7 1.3 1.6 1.3.9 0 1.6-.5 1.6-1.3\"><\u002Fpath>\n              <path d=\"M11.1 6.2v.7M11.1 11.1v.7\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h3 class=\"pain__title\">Tired of pay-per-quote leads<\u002Fh3>\n        <p class=\"pain__problem\">Marketplaces charge for every quote request, whether the traveler books, replies, or disappears.<\u002Fp>\n        <div class=\"pain__fix\">\n          <span class=\"pain__arrow\" aria-hidden=\"true\">\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <p><b>Wandar<\u002Fb> spots demand before it becomes another paid lead.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- 3 · Too late -->\n      <article class=\"pain pain--gold wf-reveal d3\">\n        <div class=\"pain__top\">\n          <div class=\"pain__icon\" aria-hidden=\"true\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <circle cx=\"12\" cy=\"13\" r=\"8\"><\u002Fcircle>\n              <path d=\"M12 13V8.5\"><\u002Fpath>\n              <path d=\"M12 13l3.5 2\"><\u002Fpath>\n              <path d=\"M9 2h6\"><\u002Fpath>\n              <path d=\"M19 6l1.5-1.5\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h3 class=\"pain__title\">Entering the sale too late<\u002Fh3>\n        <p class=\"pain__problem\">By the time a traveler sends an inquiry, they've often already compared camps, destinations, and operators.<\u002Fp>\n        <div class=\"pain__fix\">\n          <span class=\"pain__arrow\" aria-hidden=\"true\">\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <p><b>Wandar<\u002Fb> gets you in while trust is still forming.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n      <!-- 4 · Weak inquiries -->\n      <article class=\"pain pain--nature wf-reveal d4\">\n        <div class=\"pain__top\">\n          <div class=\"pain__icon\" aria-hidden=\"true\">\n            <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\">\n              <path d=\"M13 20v-1a5 5 0 0 0-5-5H6a5 5 0 0 0-5 5v1\"><\u002Fpath>\n              <circle cx=\"7\" cy=\"7\" r=\"4\"><\u002Fcircle>\n              <path d=\"M17 8l5 5M22 8l-5 5\"><\u002Fpath>\n            <\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <h3 class=\"pain__title\">Wasting time on weak inquiries<\u002Fh3>\n        <p class=\"pain__problem\">Every weak lead still costs you replies, follow-ups, and itinerary work that goes nowhere.<\u002Fp>\n        <div class=\"pain__fix\">\n          <span class=\"pain__arrow\" aria-hidden=\"true\">\n            <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M5 12h14M13 6l6 6-6 6\"><\u002Fpath><\u002Fsvg>\n          <\u002Fspan>\n          <p><b>Wandar<\u002Fb> focuses your team on clearer intent, budget, and timing.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Farticle>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<script>\n  // no-op placeholder removed; entrance is pure CSS\n<\u002Fscript>\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
